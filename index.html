<div id="historyOutput"></div>

<div class="modal-content">

<span class="close" onclick="closeHistory()">&times;</span>

<h2>📂 Employee Payroll History</h2>

<div id="historyContent"></div>

</div>

</div>
</div>

<script>
 let payrollHistory = [];
let latestPayroll = null;

function calculatePayroll(){

let name = document.getElementById("name").value.trim();
let wage = parseFloat(document.getElementById("wage").value) || 0;
let present = parseInt(document.getElementById("present").value) || 0;
let lateHours = parseFloat(document.getElementById("lateHours").value) || 0;
let lateMinutes = parseFloat(document.getElementById("lateMinutes").value) || 0;
let absence = parseInt(document.getElementById("absence").value) || 0;

if(name==""){
alert("Please enter the employee name.");
return;
}

let totalLateHours = lateHours + (lateMinutes/60);

let hourlyRate = wage / 8;

let baseSalary = wage * present;

let lateDeduction = totalLateHours * hourlyRate;

let absenceDeduction = absence * wage;

let finalSalary = baseSalary - lateDeduction - absenceDeduction;

let totalDays = present + absence;

let attendanceScore = totalDays > 0 ? (present/totalDays)*100 : 0;

let status="";

if(attendanceScore>=90){
status="✨ Excellent";
}
else if(attendanceScore>=75){
status="👍 Good";
}
else{
status="⚠️ Poor";
}

latestPayroll = {
    name: name,
    wage: wage,
    present: present,
    lateHours: lateHours,
    lateMinutes: lateMinutes,
    absence: absence,
    baseSalary: baseSalary,
    lateDeduction: lateDeduction,
    absenceDeduction: absenceDeduction,
    finalSalary: finalSalary,
    attendanceScore: attendanceScore,
    status: status,
    date: new Date().toLocaleString()
};
document.getElementById("output").innerHTML=

"<b>👤 "+name+"</b><br><br>"+

"💰 Base Salary: ₱"+baseSalary.toFixed(2)+"<br>"+

"⏱ Late Deduction: ₱"+lateDeduction.toFixed(2)+"<br>"+

"❌ Absence Deduction: ₱"+absenceDeduction.toFixed(2)+"<br><br>"+

"<b>💵 Final Salary: ₱"+finalSalary.toFixed(2)+"</b><br><br>"+

"📊 Attendance Score: "+attendanceScore.toFixed(1)+"%<br>"+

"🏷 Status: "+status;

}

function savePayroll(){

if(latestPayroll == null){
    alert("Please calculate payroll first.");
    return;
}

let employee = payrollHistory.find(emp => emp.name === latestPayroll.name);

if(employee){
    employee.history.push({
        date: new Date().toLocaleString(),
        finalSalary: latestPayroll.finalSalary,
        attendanceScore: latestPayroll.attendanceScore,
        status: latestPayroll.status
    });
}else{

    latestPayroll.history = [{
        date: new Date().toLocaleString(),
        finalSalary: latestPayroll.finalSalary,
        attendanceScore: latestPayroll.attendanceScore,
        status: latestPayroll.status
    }];

    payrollHistory.push(latestPayroll);
}
displayHistory();

updateDashboard();

alert("Payroll saved successfully!");

}
 function displayHistory(){

let tbody = document.getElementById("historyTable").getElementsByTagName("tbody")[0];

tbody.innerHTML = "";

for(let i=0;i<payrollHistory.length;i++){

let row = tbody.insertRow();

row.insertCell(0).innerHTML = payrollHistory[i].name;

row.insertCell(1).innerHTML =
"₱ " + payrollHistory[i].finalSalary.toFixed(2);

row.insertCell(2).innerHTML =
payrollHistory[i].status;

let historyCell = row.insertCell(3);

historyCell.innerHTML =
'<button class="icon-btn view-btn" onclick="viewHistory(\'' +
payrollHistory[i].name +
'\')">📂</button>';

let actionCell = row.insertCell(4);

actionCell.innerHTML =
'<button class="icon-btn delete-btn" onclick="deleteRow(this)">🗑</button>';

}

}
function updateDashboard(){

let totalEmployees = payrollHistory.length;

let totalPayroll = 0;

for(let i=0;i<payrollHistory.length;i++){

totalPayroll += payrollHistory[i].finalSalary;

}

let averageSalary = 0;

if(totalEmployees>0){

averageSalary = totalPayroll/totalEmployees;

}

document.getElementById("totalEmployees").innerHTML = totalEmployees;

document.getElementById("totalPayroll").innerHTML =
"₱"+totalPayroll.toFixed(2);

document.getElementById("averageSalary").innerHTML =
"₱"+averageSalary.toFixed(2);

}
    function searchPayroll(){

let input = document.getElementById("searchEmployee").value.toUpperCase();

let table = document.getElementById("historyTable");

let rows = table.getElementsByTagName("tr");

for(let i = 1; i < rows.length; i++){

let employee = rows[i].cells[0].innerHTML.toUpperCase();

if(employee.indexOf(input) > -1){

rows[i].style.display = "";

}else{

rows[i].style.display = "none";

}

}

}

function deleteRow(button){

let row = button.parentNode.parentNode;

let index = row.rowIndex - 1;

payrollHistory.splice(index,1);

displayHistory();

updateDashboard();

}
    function printPayslip(){

if(latestPayroll == null){

alert("Please calculate payroll first.");

return;

}

let printWindow = window.open("", "", "width=800,height=700");

let payslip = `

</tr>

`;

printWindow.document.open();
printWindow.document.write(payslip);
printWindow.document.close();

printWindow.focus();
printWindow.print();

}
    function viewHistory(employeeName){

let content = "";

for(let i=0;i<payrollHistory.length;i++){

if(payrollHistory[i].name===employeeName){

content +=
`
<div style="padding:10px;
margin-bottom:10px;
border-radius:10px;
background:#f5f5ff;">

<b>📅 ${payrollHistory[i].date}</b><br><br>

💰 Final Salary:
<b>₱${payrollHistory[i].finalSalary.toFixed(2)}</b><br>

📊 Attendance:
${payrollHistory[i].attendanceScore.toFixed(1)}%<br>

🏷 Status:
${payrollHistory[i].status}

</div>
`;

}

}

document.getElementById("historyContent").innerHTML = content;

document.getElementById("historyModal").style.display="block";

}
    function closeHistory(){

document.getElementById("historyModal").style.display="none";

}
</script>

</body>
</html>
