<!DOCTYPE html>
<html>
<head>
<title>Attendance Impact Payroll Simulator</title>

<style>
body{
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 0;
}
.container{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:25px;
    width:420px;
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    text-align:center;
    color:#333;
}

h2{
    margin-bottom:15px;
}

input{
    width:90%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background: rgba(255,255,255,0.6);
}

button{
    margin-top:10px;
    padding:12px;
    width:95%;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.result{
    margin-top:15px;
    padding:10px;
    border-radius:12px;
    background: rgba(255,255,255,0.5);
    font-size:14px;
}
    .dashboard{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:15px;
margin-bottom:15px;
}

.card{
flex:1;
background:rgba(255,255,255,0.45);
padding:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card h4{
font-size:13px;
margin:0;
color:#555;
}

.card p{
font-size:18px;
font-weight:bold;
margin-top:8px;
color:#5b4fc9;
}
</style>
</head>

<body>

<div class="container">

<h2>✨ Payroll Simulator</h2>

<input type="text" id="name" placeholder="Employee Name">

<input type="number" id="wage" placeholder="Daily Wage">

<input type="number" id="present" placeholder="Days Present">

<input type="number" id="lateHours" placeholder="Late Hours">

<input type="number" id="lateMinutes" placeholder="Late Minutes">

<input type="number" id="absence" placeholder="Absences">

<button onclick="calculatePayroll()">Calculate Payroll</button>



<button onclick="savePayroll()">Save Payroll</button>

<div class="result" id="output"></div>
   <h3>Payroll History</h3>
<div class="dashboard">

<div class="card">
<h4>Total Employees</h4>
<p id="totalEmployees">0</p>
</div>

<div class="card">
<h4>Total Payroll</h4>
<p id="totalPayroll">₱0.00</p>
</div>

<div class="card">
<h4>Average Salary</h4>
<p id="averageSalary">₱0.00</p>
</div>

</div>
    <input
type="text"
id="searchEmployee"
placeholder="🔍 Search Employee"
onkeyup="searchPayroll()"
style="
width:95%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.6);
outline:none;
">

<table id="historyTable" border="1" style="width:100%; margin-top:15px; border-collapse:collapse;">
<thead>
<tr>
<th>Name</th>
<th>Final Salary</th>
<th>Status</th>

</tr>
</thead>

<tbody>

</tbody>
</table>

</div>

<script>
 let payrollHistory = [];

let latestPayroll = null;

function calculatePayroll(){

let name = document.getElementById("name").value;
let wage = parseFloat(document.getElementById("wage").value);
let present = parseInt(document.getElementById("present").value);
let lateHours = parseFloat(document.getElementById("lateHours").value) || 0;
let lateMinutes = parseFloat(document.getElementById("lateMinutes").value) || 0;
let absence = parseInt(document.getElementById("absence").value) || 0;

let totalLateHours = lateHours + (lateMinutes / 60);
let hourlyRate = wage / 8;

let baseSalary = present * wage;
let lateDeduction = totalLateHours * hourlyRate;
let absenceDeduction = absence * wage;

let finalSalary = baseSalary - lateDeduction - absenceDeduction;

let totalDays = present + absence;
let attendanceScore = totalDays > 0 ? (present / totalDays) * 100 : 0;

let status = "";
if(attendanceScore >= 90){
    status = "✨ Excellent";
}else if(attendanceScore >= 75){
    status = "👍 Good";
}else{
    status = "⚠️ Poor";
}
latestPayroll = {
    name: name,
    salary: finalSalary.toFixed(2),
    status: status
};
document.getElementById("output").innerHTML =
"<b>👤 " + name + "</b><br><br>" +
"💰 Base: " + baseSalary.toFixed(2) + "<br>" +
"⏱ Late Deduction: " + lateDeduction.toFixed(2) + "<br>" +
"❌ Absence Deduction: " + absenceDeduction.toFixed(2) + "<br><br>" +
"<b>💵 Final Salary: " + finalSalary.toFixed(2) + "</b><br><br>" +
"📊 Attendance: " + attendanceScore.toFixed(1) + "%<br>" +
"🏷 Status: " + status;

} 
   function savePayroll(){

if(latestPayroll == null){
    alert("Please calculate the payroll first.");
    return;
}

payrollHistory.push(latestPayroll);

let table = document.getElementById("historyTable").getElementsByTagName("tbody")[0];

let row = table.insertRow();

row.insertCell(0).innerHTML = latestPayroll.name;
row.insertCell(1).innerHTML = "₱ " + latestPayroll.salary;
row.insertCell(2).innerHTML = latestPayroll.status;
updateDashboard();
alert("Payroll saved successfully!");

}function updateDashboard(){

let totalEmployees = payrollHistory.length;

let totalPayroll = 0;

for(let i=0;i<payrollHistory.length;i++){

totalPayroll += Number(payrollHistory[i].salary);

}

let averageSalary = 0;

if(totalEmployees>0){

averageSalary = totalPayroll/totalEmployees;

}

document.getElementById("totalEmployees").innerHTML = totalEmployees;

document.getElementById("totalPayroll").innerHTML =
"₱"+totalPayroll.toFixed(2);

document.getElementById("averageSalary").innerHTML =
"₱"+averageSalary.toFixed(2);

}
    function searchPayroll(){

let input = document.getElementById("searchEmployee").value.toUpperCase();

let table = document.getElementById("historyTable");

let rows = table.getElementsByTagName("tr");

for(let i = 1; i < rows.length; i++){

let employee = rows[i].cells[0].innerHTML.toUpperCase();

if(employee.indexOf(input) > -1){

rows[i].style.display = "";

}else{

rows[i].style.display = "none";

}

}

}
   

</script>

</body>
</html>
